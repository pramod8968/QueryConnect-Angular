<div class="card">
    <div class="card-body mt-5">
        <i><h2><u>UPDATE YOUR ANSWER HERE</u></h2></i>
            <div class="row">
                <div class="col-md-10">
                    
                    <div class="mt-2">
                        <label>
                            <b>Description:</b>
                        </label>
                        <textarea placeholder="Elaborate your answer here..." class="form-control" [(ngModel)]="answerData.description"  rows="5" cols="51"></textarea>
                    </div>
        
                    <div class="mt-2">
                        <button type="submit" id="update-btn"  class="btn btn-primary" routerLink="/postedQuestion" (click)="updateAnswer()" >Update</button>
                        <button type="submit" id="cancel-btn"  class="btn btn-danger" routerLink="/postedQuestion">Cancel</button>
                    </div>
        
                </div>
            </div>
    </div>
  </div>
